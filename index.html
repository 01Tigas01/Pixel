<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ativar Cadastro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:#fff;
}

.card{
width:100%;
max-width:420px;
background:#111;
padding:30px;
border-radius:20px;
border:1px solid #222;
}

.logo{
text-align:center;
font-size:32px;
font-weight:bold;
color:#00ff40;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#aaa;
margin-bottom:25px;
}

.progress{
height:18px;
background:#222;
border-radius:30px;
overflow:hidden;
margin-bottom:25px;
}

.progress-fill{
width:79%;
height:100%;
background:#00ff40;
}

form{
display:flex;
flex-direction:column;
gap:14px;
}

input{
padding:14px;
border:none;
border-radius:10px;
background:#1c1c1c;
color:#fff;
}

button{
padding:15px;
border:none;
border-radius:10px;
background:#00ff40;
font-weight:bold;
cursor:pointer;
}
</style>

<body>
<div class="card">
<div class="logo">CTECHPLAY</div>
<div class="subtitle">Ative seu cadastro para continuar</div>

<div class="progress">
<div class="progress-fill"></div>
</div>

<form action="compra-confirmada.html">
<input type="text" placeholder="Digite seu nome" required>
<input type="email" placeholder="Digite seu email" required>
<input type="tel" placeholder="Digite seu WhatsApp" required>
<button id="btn">ATIVAR CADASTRO</button>
</form>
</div>

<script>
document.getElementById("btn").addEventListener("click", function () {
fbq("track","InitiateCheckout");
});
</script>
